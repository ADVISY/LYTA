project_id = "shxbcszukoegvvejcpsn"

[auth]
enabled = true
site_url = "https://app.lyta.ch"
jwt_expiry = 3600
additional_redirect_urls = ["https://lyta-xi.vercel.app/**", "https://app.lyta.ch/**", "https://*.lyta.ch/**"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
# 86400s = 24h : les liens d'invitation collaborateur/client doivent durer
# 1 journée complète (avant : 3600s = 1h, trop court — les users ne cliquaient
# pas dans l'heure et le lien expirait, "erreur de connexion" garantie).
otp_expiry = 86400

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

